<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
  <radialGradient id="bg" cx="20%" cy="8%" r="115%">
    <stop offset="0" stop-color="#26374d"/>
    <stop offset=".52" stop-color="#191a27"/>
    <stop offset="1" stop-color="#11121b"/>
  </radialGradient>
  <linearGradient id="edge" x1="118" y1="70" x2="405" y2="448" gradientUnits="userSpaceOnUse">
    <stop stop-color="#22dcff"/>
    <stop offset=".5" stop-color="#8e7dff"/>
    <stop offset="1" stop-color="#ff3fa4"/>
  </linearGradient>
  <linearGradient id="die" x1="135" y1="117" x2="275" y2="273" gradientUnits="userSpaceOnUse">
    <stop stop-color="#ffffff"/><stop offset="1" stop-color="#dfe4f0"/>
  </linearGradient>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="15"/>
  </filter>
  <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="14" stdDeviation="13" flood-color="#05060b" flood-opacity=".62"/>
  </filter>
</defs>
<rect width="512" height="512" rx="118" fill="url(#bg)"/>
<rect x="34" y="34" width="444" height="444" rx="104" fill="none" stroke="#ffffff" stroke-opacity=".075" stroke-width="3"/>

<!-- neon road glow -->
<path d="M347 62 C423 120 418 194 330 245 C242 296 224 356 310 450" fill="none" stroke="url(#edge)" stroke-width="142" stroke-linecap="round" opacity=".24" filter="url(#soft)"/>
<!-- road edges and surface -->
<path d="M347 62 C423 120 418 194 330 245 C242 296 224 356 310 450" fill="none" stroke="url(#edge)" stroke-width="126" stroke-linecap="round"/>
<path d="M347 62 C423 120 418 194 330 245 C242 296 224 356 310 450" fill="none" stroke="#2b2e3f" stroke-width="104" stroke-linecap="round"/>
<!-- dashed centre line -->
<path d="M347 62 C423 120 418 194 330 245 C242 296 224 356 310 450" fill="none" stroke="#b9ff38" stroke-width="11" stroke-linecap="round" stroke-dasharray="30 27"/>

<!-- single die -->
<g filter="url(#shadow)">
  <rect x="82" y="106" width="194" height="194" rx="53" fill="url(#die)"/>
  <rect x="83.5" y="107.5" width="191" height="191" rx="51.5" fill="none" stroke="#ffffff" stroke-opacity=".85" stroke-width="3"/>
  <circle cx="132" cy="156" r="17" fill="#171824"/>
  <circle cx="228" cy="156" r="17" fill="#171824"/>
  <circle cx="180" cy="203" r="17" fill="#171824"/>
  <circle cx="132" cy="252" r="17" fill="#171824"/>
  <circle cx="228" cy="252" r="17" fill="#171824"/>
</g>

<!-- tiny player-colour markers -->
<circle cx="110" cy="397" r="15" fill="#22dcff"/>
<circle cx="155" cy="397" r="15" fill="#ff3fa4"/>
<circle cx="200" cy="397" r="15" fill="#b9ff38"/>
</svg>